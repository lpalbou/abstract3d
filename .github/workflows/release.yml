name: CI / Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install CPU torch first (Linux keeps CUDA wheels off the runner)
        if: runner.os == 'Linux'
        run: python -m pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install package with validated-backend test surface
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[triposr,test]"

      - name: Run test suite (Linux, headless GL)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y xvfb libegl1 libgl1
          xvfb-run -a python -m pytest -q tests

      - name: Run test suite (macOS)
        if: runner.os == 'macOS'
        run: python -m pytest -q tests

  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  docs:
    name: Build doc site
    needs: test
    # The github-pages environment only accepts deployments from the default
    # branch, and every release tag is cut from main anyway, so the site
    # deploys on main pushes only.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build MkDocs site
        run: |
          python -m pip install mkdocs-material
          mkdocs build --strict
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy-docs:
    name: Publish doc site (GitHub Pages)
    needs: docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: github-pages
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  github-release:
    name: GitHub release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create release with artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --title "abstract3d $GITHUB_REF_NAME" \
              --generate-notes
          fi

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # Trusted publishing (OIDC), the same shape abstractcore's release uses:
    # no long-lived token secret; PyPI trusts this repo+workflow+environment.
    environment:
      name: pypi
      url: https://pypi.org/project/abstract3d/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
