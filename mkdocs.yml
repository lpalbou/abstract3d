site_name: Abstract3D
site_description: Local-first 3D generation for the AbstractFramework ecosystem
site_url: https://lpalbou.github.io/abstract3d/
repo_url: https://github.com/lpalbou/abstract3d
repo_name: lpalbou/abstract3d
edit_uri: blob/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest

# Internal planning docs and the repo-facing docs index stay in the repository
# but are not part of the published site.
exclude_docs: |
  backlog/
  /README.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - API and CLI: api.md
  - Models: models.md
  - Benchmarks: benchmarks.md
  - Methodology: methodology.md
  - Knowledge Base: KnowledgeBase.md
  - AbstractCore Integration: integration-abstractcore.md
  - FAQ: faq.md
  - Troubleshooting: troubleshooting.md
  - ADRs:
      - Index: adr/README.md
      - 0001 Local-first GLB contract: adr/0001_scene3d_local_first_glb_contract.md
      - 0002 Pinned TripoSR and composed t23d: adr/0002_validated_backend_uses_pinned_triposr_and_composed_t23d.md
      - 0003 TRELLIS.2 official assets only: adr/0003_trellis2_uses_official_upstream_assets_only.md
      - 0004 Step1X geometry-only backend: adr/0004_step1x_geometry_only_official_backend_with_local_compatibility_patches.md
      - 0005 Hunyuan3D-2.1 license-gated backend: adr/0005_hunyuan3d21_license_gated_official_shape_backend.md
      - 0006 Multi-view geometry via Hunyuan3D-2mv: adr/0006_multiview_geometry_via_hunyuan3d_2mv_and_reference_view_qa.md
      - 0007 Canonical orthographic projection: adr/0007_canonical_orthographic_projection_and_first_surface_visibility.md
      - 0008 Photometric pose and witness gating: adr/0008_photometric_pose_overlap_registration_and_witness_gating.md
      - 0009 Export material truth and fill detail: adr/0009_export_material_truth_and_fill_detail_synthesis.md
